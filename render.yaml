services:
  - type: web
    name: syzmeku-engine
    env: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: ENGINE_SIGNATURE
        value: "EL_KAI_THARION_KAI_ZHUN"
      - key: SYSTEM_VECTOR
        value: "TRIANGULUM_THETA_7"
